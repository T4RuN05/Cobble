name: Cobble Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build-cobble-windows:
    name: Build Cobble Windows
    uses: ./.github/workflows/make-installer-windows.yml
    with:
      runner: windows-2022
      displayed_name: Cobble Windows x64
      msystem: mingw64
      msys_package_env: x86_64
      publish_portable_version: true
      build_type: RelWithDebInfo
      head_sha: ${{ github.sha }}

  publish-release:
    name: Publish Release
    needs: build-cobble-windows
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v6
        with:
          merge-multiple: true
          path: ${{ github.workspace }}/artifacts

      - name: Zip portable folder
        run: |
          cd ${{ github.workspace }}/artifacts
          for D in *; do [ -d "${D}" ] && zip -r "${D}.zip" "${D}" > /dev/null && rm -rf "${D}" && echo "Zipped ${D}"; done
          ls -lh

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "${{ github.workspace }}/artifacts/*"
          allowUpdates: true
          draft: false
          name: "Cobble Release ${{ github.ref_name }}"
          body: "Automated release build of Cobble for Windows x64."
          removeArtifacts: true
          replacesArtifacts: true
          tag: ${{ github.ref_name }}
